# GLM-4.6V-Flash — Z.AI's free multimodal vessel. Capacity can be more
# variable than FlashX, so it remains a user choice rather than a silent
# automatic fallback.
identity:
  name: "glm-4-6v-flash"
  family: "openai_chat"
  base_model: "glm-4.6v-flash"
  provider: "openai_compat"
  endpoint: "glm-4.6v-flash"
  base_url: "https://api.z.ai/api/paas/v4"
  api_key_env: "ZAI_API_KEY"
  locality: "api"
context:
  window_tokens: 128000
  practical_window_tokens: 108000
  block_budgets: {}
prompt_structure:
  system_prompt: true
  template: "openai_messages"
  strict_alternation: false
  prefill_supported: false
  stop_sequences: []
sampling:
  temperature:
    mode: dynamic
    min: 0.0
    max: 1.0
    precision: 2
capabilities:
  tool_use: true
  vision: true
  structured_output: "unknown"
  streaming: true
module_capability:
  validated: []
  saturates_on: []
  ceiling_notes: "registered for visual transduction; behavioral ceiling not yet measured"
runtime:
  gpu_constraints: "server-side"
  cost: "free Z.AI visual tier; capacity may be variable"
  latency_class: "fast when capacity is available"
quirks:
  - "multimodal input uses OpenAI-compatible image_url content blocks"
  - "free capacity returned overload during the 2026-07-13 live probe"
harness:
  last_mechanical_pass: null
  fidelity_floor_results: {}
